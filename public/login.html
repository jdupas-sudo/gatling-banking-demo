<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — GatlingBank</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="logo-icon">N</div>
        <h1>Welcome back</h1>
        <p>Sign in to your GatlingBank account</p>
      </div>

      <div class="auth-card">
        <div id="alert" class="alert"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="alice.martin@example.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-block" style="margin-top:8px;">
            Sign In
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) window.location.href = "/dashboard";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert("alert");

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const data = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });

        setToken(data.token);
        setUser(data.user);
        window.location.href = "/dashboard";
      } catch (err) {
        showAlert("alert", err.message);
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
